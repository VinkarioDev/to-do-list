<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Finlandica+Text:ital,wght@0,100..900;1,100..900&family=Fira+Code:wght@300..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <title>To Do List</title>
  </head>
  <body>
    <div class="container">
      <h1>To do list</h1>
      <div class="input-to-do-list">
        <form class="form" action="">
          <input
            autocomplete="off"
            type="text"
            id="input"
            maxlength="30"
            placeholder="Digite a task"
          />
          <hr>
          <button type="submit" id="botao">Salvar</button>
        </form>
      </div>
      <ul class="ul"></ul>
    </div>

    <script src="assets/js/main.js"></script>
  </body>
</html>
